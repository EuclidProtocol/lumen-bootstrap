version: "3"
networks:
  lumen-network:
services:
  lumen-1:
      image: euclidprotocol/lumend:latest
      build:
        context: .
        dockerfile: Dockerfile
      volumes:
        - ./.config/.lumen-1/:/lumend/.lumend/
      environment:
        - BINARY=lumend
        - CHAIN_ID=lumen-1
        - DENOM=ualpha
        - STAKE_DENOM=usync
        - VALIDATOR_MONIKER=validator
        - VALIDATOR_MNEMONIC=${VALIDATOR_MNEMONIC}
        # NODE_IP is the ip of the node to connect to
        - NODE_IP=${NODE_IP}
        # PEERS is a comma separated list of peers to connect to
        - PEERS=${PEERS}
        # PRIMARY_SNAP_RPC_IP is the ip of the primary snap rpc to fetch latest block height and hash
        - PRIMARY_SNAP_RPC_IP=${PRIMARY_SNAP_RPC_IP}
        # SNAP_RPCS is a comma separated list of primary snap rpc ips
        - SNAP_RPCS=${SNAP_RPCS}
      ports:
        - 26657:26657 # RPC
        - 1317:1317 # LCD
        - 9090:9090 # GRPC
        - 26656:26656 # P2P
      networks:
        - lumen-network
      restart: on-failure